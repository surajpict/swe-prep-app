<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SWE Prep">
<meta name="description" content="Track SWE interview prep — sections, topics, notes, and progress">
<title>SWE Prep Tracker</title>
<style>
  :root {
    --bg: #ffffff;
    --surface: #ffffff;
    --surface2: #f8fafc;
    --border: #e2e8f0;
    --text: #0f172a;
    --muted: #64748b;
    --accent: #2563eb;
    --green: #16a34a;
    --green-bg: #f0fdf4;
    --yellow: #ca8a04;
    --yellow-bg: #fefce8;
    --orange: #ea580c;
    --orange-bg: #fff7ed;
    --blue-bg: #eff6ff;
    --purple: #7c3aed;
    --purple-bg: #f5f3ff;
    --teal: #0d9488;
    --teal-bg: #f0fdfa;
    --pink: #db2777;
    --pink-bg: #fdf2f8;
    --danger: #dc2626;
    --danger-bg: #fef2f2;
    --focus: #2563eb;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 100px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  :focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }

  .ico { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; line-height: 0; }
  .ico svg { width: 1em; height: 1em; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
  .logo { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
  .logo-icon { width: 28px; height: 28px; border-radius: 7px; background: var(--blue-bg); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 15px; }
  .logo span { color: var(--accent); font-weight: 600; }
  .header-actions { display: flex; align-items: center; gap: 8px; }
  .icon-btn { width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; font-size: 17px; display: flex; align-items: center; justify-content: center; transition: color 0.15s, border-color 0.15s, background 0.15s; }
  .icon-btn:hover { color: var(--accent); border-color: #bfdbfe; background: var(--blue-bg); }
  .overall-progress { text-align: right; font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .overall-progress .prog-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--green-bg); color: var(--green); font-size: 16px; display: flex; align-items: center; justify-content: center; }
  .overall-progress strong { display: block; font-size: 20px; color: var(--green); font-weight: 700; line-height: 1.1; }
  .progress-bar-wrap { background: var(--surface2); border-radius: 6px; height: 6px; overflow: hidden; border: 1px solid var(--border); }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #22c55e, #16a34a); border-radius: 5px; transition: width 0.4s ease; }

  .tabs { display: flex; gap: 6px; padding: 10px 16px 0; overflow-x: auto; scrollbar-width: none; background: var(--bg); }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 500; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; white-space: nowrap; transition: all 0.15s; font-family: inherit; }
  .tab .tab-ico { font-size: 13px; opacity: 0.7; }
  .tab.active { color: #fff; border-color: transparent; }
  .tab.active .tab-ico { opacity: 1; }
  .tab-all.active { background: #334155; border-color: #334155; }
  .tab-sec-sd.active { background: #2563eb; }
  .tab-sec-hld.active { background: #7c3aed; }
  .tab-sec-lld.active { background: #0d9488; }
  .tab-sec-dsa.active { background: #ea580c; }
  .tab-sec-beh.active { background: #db2777; }
  .tab-sec-con.active { background: #475569; }
  .tab-custom.active { background: #64748b; }
  .tab:focus-visible { outline-offset: 2px; }

  main { padding: 14px 16px; max-width: 720px; margin: 0 auto; }

  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 10px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .stat-icon { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 17px; }
  .stat-icon.done { background: var(--green-bg); color: var(--green); }
  .stat-icon.progress { background: var(--yellow-bg); color: var(--yellow); }
  .stat-icon.pending { background: var(--surface2); color: var(--muted); }
  .stat-num { font-size: 22px; font-weight: 700; display: block; line-height: 1; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }

  .toolbar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; min-width: 160px; }
  .search-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px 10px 38px; color: var(--text); font-size: 15px; outline: none; transition: border-color 0.15s; font-family: inherit; }
  .search-input:focus { border-color: #93c5fd; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  .search-input::placeholder { color: var(--muted); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; pointer-events: none; display: flex; }
  .filter-wrap { position: relative; display: flex; align-items: center; }
  .filter-wrap .filter-ico { position: absolute; left: 10px; color: var(--muted); font-size: 14px; pointer-events: none; display: flex; }
  .filter-select { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px 10px 32px; color: var(--text); font-size: 13px; font-family: inherit; cursor: pointer; }
  .filter-select:focus { border-color: #93c5fd; outline: none; }

  .section-block { margin-bottom: 8px; }
  .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; margin-top: 16px; padding: 8px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; user-select: none; }
  .section-header:first-child { margin-top: 0; }
  .section-header.nested { margin-left: 16px; background: var(--surface); border-style: dashed; }
  .section-icon { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .section-chevron { font-size: 12px; color: var(--muted); width: 14px; flex-shrink: 0; transition: transform 0.2s; display: flex; }
  .section-header.collapsed .section-chevron { transform: rotate(-90deg); }
  .section-title { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; min-width: 0; }
  .section-count { font-size: 11px; color: var(--muted); flex-shrink: 0; background: var(--surface); border: 1px solid var(--border); padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .section-actions { display: flex; gap: 2px; flex-shrink: 0; }
  .section-actions button { background: none; border: none; color: var(--muted); cursor: pointer; padding: 5px 7px; font-size: 14px; border-radius: 6px; display: flex; align-items: center; }
  .section-actions button:hover { color: var(--accent); background: var(--blue-bg); }
  .section-body { padding-left: 4px; }
  .section-body.hidden { display: none; }

  .topic-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 6px; position: relative; overflow: hidden; transition: border-color 0.15s, box-shadow 0.15s; }
  .topic-card:hover { border-color: #cbd5e1; box-shadow: 0 1px 4px rgba(15,23,42,0.04); }
  .topic-card.nested { margin-left: 16px; }
  .topic-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 10px 0 0 10px; }
  .topic-card.s-pending::before { background: #cbd5e1; }
  .topic-card.s-progress::before { background: var(--yellow); }
  .topic-card.s-done::before { background: var(--green); }
  .topic-card.p-high { border-color: #fed7aa; }
  .topic-card.p-high::after { content: ''; position: absolute; right: 0; top: 0; width: 0; height: 0; border-style: solid; border-width: 0 12px 12px 0; border-color: transparent var(--orange) transparent transparent; }

  .topic-row { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .status-dot { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; border: 1.5px solid var(--border); background: var(--surface2); color: var(--muted); }
  .s-done .status-dot { background: var(--green-bg); border-color: #bbf7d0; color: var(--green); }
  .s-progress .status-dot { background: var(--yellow-bg); border-color: #fef08a; color: var(--yellow); }
  .topic-info { flex: 1; min-width: 0; }
  .topic-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 4px; word-break: break-word; }
  .s-done .topic-name { text-decoration: line-through; color: var(--muted); }
  .topic-meta { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
  .meta-chip { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); padding: 2px 7px; border-radius: 10px; font-weight: 500; }
  .meta-chip .ico { font-size: 11px; }
  .meta-chip.notes { color: #2563eb; background: var(--blue-bg); border-color: #bfdbfe; }
  .meta-chip.links { color: var(--teal); background: var(--teal-bg); border-color: #99f6e4; }
  .meta-chip.reviewed { color: var(--green); background: var(--green-bg); border-color: #bbf7d0; }
  .meta-chip.priority-high { color: var(--orange); background: var(--orange-bg); border-color: #fed7aa; }
  .status-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 600; padding: 4px 9px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.3px; white-space: nowrap; flex-shrink: 0; }
  .status-badge .ico { font-size: 11px; }
  .badge-pending { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .badge-progress { background: var(--yellow-bg); color: #a16207; border: 1px solid #fef08a; }
  .badge-done { background: var(--green-bg); color: #15803d; border: 1px solid #bbf7d0; }

  .topic-notes { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: none; }
  .topic-notes.open { display: block; }
  .notes-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; color: var(--text); font-size: 13px; resize: vertical; min-height: 72px; outline: none; font-family: inherit; transition: border-color 0.15s; }
  .notes-input:focus { border-color: #a1a1aa; }
  .notes-input::placeholder { color: var(--muted); }
  .field-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin: 10px 0 6px; display: flex; align-items: center; gap: 5px; }
  .field-label .ico { font-size: 13px; color: var(--accent); }
  .resource-list { margin-bottom: 8px; }
  .resource-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; padding: 6px 8px; background: var(--teal-bg); border: 1px solid #99f6e4; border-radius: 8px; }
  .resource-item .ico { color: var(--teal); font-size: 14px; }
  .resource-item a { color: #0f766e; font-size: 13px; text-decoration: none; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
  .resource-item a:hover { text-decoration: underline; }
  .resource-item button { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 2px 6px; border-radius: 4px; display: flex; }
  .resource-item button:hover { color: var(--danger); background: var(--danger-bg); }
  .resource-add { display: flex; gap: 6px; margin-top: 6px; }
  .resource-add input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; color: var(--text); font-size: 13px; font-family: inherit; }
  .resource-add input:focus { border-color: #a1a1aa; outline: none; }
  .notes-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; align-items: center; }
  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 12px; border-radius: 8px; font-size: 11px; font-weight: 600; border: none; cursor: pointer; transition: opacity 0.15s; font-family: inherit; }
  .btn .ico { font-size: 12px; }
  .btn:active { opacity: 0.7; }
  .btn-pending { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .btn-progress { background: var(--yellow-bg); color: #a16207; border: 1px solid #fef08a; }
  .btn-done { background: var(--green-bg); color: #15803d; border: 1px solid #bbf7d0; }
  .btn-save { background: var(--accent); color: #fff; margin-left: auto; border: 1px solid var(--accent); }
  .btn-danger { background: var(--danger-bg); color: var(--danger); border: 1px solid #fecaca; }
  .btn-ghost { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
  .priority-select { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; color: var(--text); font-size: 12px; font-family: inherit; }

  .fab-wrap { position: fixed; bottom: 24px; right: 16px; z-index: 200; display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
  .fab-menu { display: none; flex-direction: column; gap: 8px; align-items: flex-end; }
  .fab-menu.open { display: flex; }
  .fab-action { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: 10px; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; font-family: inherit; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .fab-action .ico { font-size: 15px; color: var(--accent); }
  .fab-action:hover { border-color: #bfdbfe; background: var(--blue-bg); }
  .fab-main { width: 52px; height: 52px; border-radius: 14px; background: var(--accent); color: #fff; font-size: 24px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 14px rgba(37,99,235,0.35); transition: transform 0.2s; }
  .fab-main.open { transform: rotate(45deg); }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 300; display: flex; align-items: flex-end; justify-content: center; padding: 16px; }
  .modal-overlay.hidden { display: none; }
  .modal { background: var(--surface); border-radius: 12px 12px 8px 8px; padding: 22px; width: 100%; max-width: 480px; border: 1px solid var(--border); max-height: 85vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
  .modal-sub { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
  .modal-sub a { color: var(--accent); font-weight: 500; }
  .modal-input, .modal-select, .modal-textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; color: var(--text); font-size: 15px; outline: none; margin-bottom: 10px; font-family: inherit; }
  .modal-textarea { resize: vertical; min-height: 80px; }
  .modal-input:focus, .modal-select:focus, .modal-textarea:focus { border-color: #a1a1aa; }
  .modal-input::placeholder, .modal-textarea::placeholder { color: var(--muted); }
  .modal-btns { display: flex; gap: 10px; margin-top: 6px; }
  .modal-cancel { background: var(--surface2); color: var(--muted); flex: 1; padding: 13px; font-size: 15px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-weight: 500; font-family: inherit; }
  .modal-add { background: var(--accent); color: #fff; flex: 1; padding: 13px; font-size: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-family: inherit; }
  .modal-danger { background: var(--danger-bg); color: var(--danger); border: 1px solid #fecaca; }

  .settings-list { list-style: none; }
  .settings-list li { margin-bottom: 8px; }
  .settings-btn { width: 100%; text-align: left; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 12px; }
  .settings-btn:hover { border-color: #bfdbfe; background: var(--blue-bg); }
  .settings-btn .settings-ico { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
  .settings-btn .settings-ico.export { background: var(--green-bg); color: var(--green); }
  .settings-btn .settings-ico.import { background: var(--blue-bg); color: var(--accent); }
  .settings-btn .settings-ico.restore { background: var(--yellow-bg); color: var(--yellow); }
  .settings-btn small { color: var(--muted); font-size: 11px; display: block; margin-top: 2px; }
  .settings-btn span.desc { flex: 1; }

  .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
  .empty-icon { width: 56px; height: 56px; margin: 0 auto 12px; border-radius: 14px; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 26px; color: var(--muted); }
  .empty p { font-size: 14px; margin-bottom: 12px; }
  .empty button { margin-top: 4px; }

  .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 10px 18px; border-radius: 8px; font-size: 13px; z-index: 400; opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none; max-width: 90%; text-align: center; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { border-color: #fecaca; color: var(--danger); background: #fef2f2; }
  .toast.success { border-color: #bbf7d0; background: #f0fdf4; }

  .sync-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 600; padding: 4px 8px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); white-space: nowrap; }
  .sync-pill .ico { font-size: 11px; }
  .sync-pill.synced { color: #15803d; background: var(--green-bg); border-color: #bbf7d0; }
  .sync-pill.syncing { color: #a16207; background: var(--yellow-bg); border-color: #fef08a; }
  .sync-pill.error { color: var(--danger); background: var(--danger-bg); border-color: #fecaca; }
  .sync-pill.cloud { color: var(--accent); background: var(--blue-bg); border-color: #bfdbfe; }
  .auth-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 14px; }
  .auth-box.signed-in { border-color: #bbf7d0; background: var(--green-bg); }
  .auth-email { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; word-break: break-all; }
  .auth-hint { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
  .settings-btn .settings-ico.sync { background: var(--blue-bg); color: var(--accent); }
  .settings-btn .settings-ico.auth { background: var(--purple-bg); color: var(--purple); }

  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

  @media (min-width: 600px) {
    .modal-overlay { align-items: center; }
    .modal { border-radius: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo" aria-label="SWE Prep Tracker">
      <span class="logo-icon" id="logoIcon"></span>
      swe<span>.</span>prep
    </div>
    <div class="header-actions">
      <span class="sync-pill" id="syncPill" title="Sync status" onclick="openAccount()" style="cursor:pointer" role="button" tabindex="0"></span>
      <button class="icon-btn" id="accountBtn" onclick="openAccount()" aria-label="Account and sync" title="Account"></button>
      <button class="icon-btn" id="settingsBtn" onclick="openSettings()" aria-label="Settings and backup" title="Settings"></button>
      <div class="overall-progress" aria-live="polite">
        <span class="prog-icon" id="progIcon"></span>
        <div><strong id="pct">0%</strong>done</div>
      </div>
    </div>
  </div>
  <div class="progress-bar-wrap" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="progressWrap">
    <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
  </div>
</header>

<nav class="tabs" id="tabBar" aria-label="Section filters"></nav>
<main id="mainContent"></main>

<div class="fab-wrap">
  <div class="fab-menu" id="fabMenu" role="menu">
    <button class="fab-action" role="menuitem" onclick="openTopicModal()"><span class="ico" id="fabTopicIco"></span> Add topic</button>
    <button class="fab-action" role="menuitem" onclick="openSectionModal()"><span class="ico" id="fabSecIco"></span> Add section</button>
  </div>
  <button class="fab-main" id="fabMain" onclick="toggleFab()" aria-label="Add item" aria-expanded="false" aria-haspopup="menu"></button>
</div>

<div class="modal-overlay hidden" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle" onclick="if(event.target===this)closeModal()">

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function clone(obj) { return JSON.parse(JSON.stringify(obj)); }

function getFreshDefaults() {
  return { version: DATA_VERSION, sections: clone(DEFAULT_SECTIONS), topics: clone(DEFAULT_TOPICS) };
}

function normalizeTopic(t) {
  return {
    id: t.id || ('t' + Date.now()),
    sectionId: t.sectionId || 'sec-sd',
    name: t.name || 'Untitled',
    status: ['pending','in-progress','done'].indexOf(t.status) >= 0 ? t.status : 'pending',
    notes: t.notes || '',
    order: typeof t.order === 'number' ? t.order : 0,
    priority: ['low','medium','high'].indexOf(t.priority) >= 0 ? t.priority : 'medium',
    resources: Array.isArray(t.resources) ? t.resources : [],
    lastReviewed: t.lastReviewed || null
  };
}

function normalizeSection(s) {
  return {
    id: s.id || ('sec' + Date.now()),
    title: s.title || 'Untitled Section',
    order: typeof s.order === 'number' ? s.order : 0,
    parentId: s.parentId || null,
    collapsed: !!s.collapsed
  };
}

function validateState(data) {
  if (!data || typeof data !== 'object') throw new Error('Invalid data');
  var sections = Array.isArray(data.sections) ? data.sections.map(normalizeSection) : [];
  var topics = Array.isArray(data.topics) ? data.topics.map(normalizeTopic) : [];
  return { version: DATA_VERSION, sections: sections, topics: topics };
}

function migrateV2(flatTopics) {
  if (!Array.isArray(flatTopics)) throw new Error('Invalid v2 data');
  var sectionMap = {};
  var sections = [];
  var order = 0;

  flatTopics.forEach(function(t) {
    var cat = t.cat || 'Other';
    if (!sectionMap[cat]) {
      var knownId = CAT_TO_SECTION[cat];
      var id = knownId || ('sec-' + cat.toLowerCase().replace(/[^a-z0-9]+/g,'-'));
      sectionMap[cat] = id;
      if (!knownId || !sections.some(function(s){ return s.id === id; })) {
        sections.push({ id: id, title: cat, order: order++, parentId: null, collapsed: false });
      }
    }
  });

  var topics = flatTopics.map(function(t, i) {
    return normalizeTopic({
      id: t.id,
      sectionId: sectionMap[t.cat || 'Other'],
      name: t.name,
      status: t.status,
      notes: t.notes,
      order: i,
      priority: t.priority || 'medium',
      resources: t.resources || [],
      lastReviewed: t.lastReviewed || null
    });
  });

  return { version: DATA_VERSION, sections: sections, topics: topics };
}

function mergeWithDefaults(data) {
  var result = validateState(data);
  var secIds = {};
  result.sections.forEach(function(s) { secIds[s.id] = true; });

  DEFAULT_SECTIONS.forEach(function(ds) {
    if (!secIds[ds.id]) {
      result.sections.push(clone(ds));
      secIds[ds.id] = true;
    }
  });

  var topicIds = {};
  result.topics.forEach(function(t) { topicIds[t.id] = t; });

  DEFAULT_TOPICS.forEach(function(dt) {
    if (topicIds[dt.id]) {
      var existing = topicIds[dt.id];
      if (!existing.sectionId) existing.sectionId = dt.sectionId;
      if (!existing.priority) existing.priority = dt.priority;
      if (!existing.resources) existing.resources = [];
    } else {
      result.topics.push(clone(dt));
    }
  });

  result.sections.sort(function(a,b) { return a.order - b.order; });
  return result;
}

function loadData() {
  var loaded = false;

  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      state = mergeWithDefaults(validateState(JSON.parse(raw)));
      loaded = true;
    }
  } catch(e) {
    try {
      var backup = localStorage.getItem(BACKUP_KEY);
      if (backup) {
        state = mergeWithDefaults(validateState(JSON.parse(backup)));
        showToast('Restored from backup', 'success');
        loaded = true;
      }
    } catch(e2) {}
  }

  if (!loaded) {
    try {
      var legacy = localStorage.getItem(LEGACY_KEY);
      if (legacy) {
        var parsed = JSON.parse(legacy);
        localStorage.setItem(LEGACY_KEY + '_preserved_' + Date.now(), legacy);
        state = mergeWithDefaults(migrateV2(parsed));
        saveData();
        showToast('Migrated your data safely to v3', 'success');
        loaded = true;
      }
    } catch(e) {}
  }

  if (!loaded) {
    state = getFreshDefaults();
  }
}

function saveDataLocalOnly() {
  try {
    var current = localStorage.getItem(STORAGE_KEY);
    if (current) localStorage.setItem(BACKUP_KEY, current);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e) {
    showToast('Save failed — export your data now', 'error');
  }
}

function saveData() {
  saveDataLocalOnly();
  scheduleCloudSave();
}

function scheduleCloudSave() {
  if (!SUPABASE_ENABLED || !sbUser) return;
  clearTimeout(cloudSaveTimer);
  cloudSaveTimer = setTimeout(function() { saveToCloud(); }, 800);
}

function isSupabaseConfigured() {
  return window.SUPABASE_URL && window.SUPABASE_ANON_KEY &&
    window.SUPABASE_URL.indexOf('YOUR_') === -1 &&
    window.SUPABASE_ANON_KEY.indexOf('YOUR_') === -1;
}

function initSupabase() {
  if (!isSupabaseConfigured() || typeof supabase === 'undefined') return false;
  try {
    sb = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
    SUPABASE_ENABLED = true;
    sb.auth.onAuthStateChange(function(event, session) {
      handleAuthChange(session);
    });
    return true;
  } catch(e) {
    return false;
  }
}

function updateSyncUI() {
  var pill = document.getElementById('syncPill');
  if (!pill) return;
  if (!SUPABASE_ENABLED) {
    pill.style.display = 'none';
    return;
  }
  pill.style.display = 'inline-flex';
  var labels = {
    local: { cls: '', text: 'Local only', icon: 'circle' },
    signed: { cls: 'cloud', text: 'Sign in', icon: 'cloud' },
    syncing: { cls: 'syncing', text: 'Syncing…', icon: 'restore' },
    synced: { cls: 'synced', text: 'Synced', icon: 'check' },
    error: { cls: 'error', text: 'Sync error', icon: 'x' }
  };
  var info = labels[syncStatus] || labels.local;
  pill.className = 'sync-pill ' + info.cls;
  pill.innerHTML = ico(info.icon, 11) + ' ' + info.text;
}

async function saveToCloud() {
  if (!sb || !sbUser || cloudPulling) return;
  syncStatus = 'syncing';
  updateSyncUI();
  try {
    var payload = {
      user_id: sbUser.id,
      data: state,
      updated_at: new Date().toISOString()
    };
    var res = await sb.from('prep_data').upsert(payload, { onConflict: 'user_id' });
    if (res.error) throw res.error;
    syncStatus = 'synced';
    updateSyncUI();
  } catch(e) {
    syncStatus = 'error';
    updateSyncUI();
    showToast('Cloud sync failed — data saved locally', 'error');
  }
}

async function loadFromCloud() {
  if (!sb || !sbUser) return;
  cloudPulling = true;
  syncStatus = 'syncing';
  updateSyncUI();
  var needsUpload = false;
  try {
    var res = await sb.from('prep_data').select('data, updated_at').eq('user_id', sbUser.id).maybeSingle();
    if (res.error) throw res.error;

    if (res.data && res.data.data && res.data.data.topics) {
      var remote = mergeWithDefaults(validateState(res.data.data));
      state = mergeStates(state, remote);
      saveDataLocalOnly();
      showToast('Synced from cloud', 'success');
    } else {
      needsUpload = true;
    }
    syncStatus = 'synced';
  } catch(e) {
    syncStatus = 'error';
    showToast('Could not load cloud data — using local copy', 'error');
  } finally {
    cloudPulling = false;
    updateSyncUI();
    render();
  }
  if (needsUpload) {
    await saveToCloud();
    showToast('Local data uploaded to cloud', 'success');
  }
}

async function manualCloudSync() {
  if (!sbUser) { openAccount(); return; }
  cloudPulling = true;
  try {
    var res = await sb.from('prep_data').select('data, updated_at').eq('user_id', sbUser.id).maybeSingle();
    if (res.error) throw res.error;
    if (res.data && res.data.data) {
      state = mergeStates(state, mergeWithDefaults(validateState(res.data.data)));
      saveDataLocalOnly();
    }
    cloudPulling = false;
    await saveToCloud();
    closeModal();
    render();
    showToast('Sync complete', 'success');
  } catch(e) {
    cloudPulling = false;
    showToast('Sync failed', 'error');
  }
}

async function handleAuthChange(session) {
  if (session && session.user) {
    sbUser = session.user;
    await loadFromCloud();
  } else {
    sbUser = null;
    syncStatus = SUPABASE_ENABLED ? 'signed' : 'local';
    updateSyncUI();
  }
}

async function signIn() {
  if (!sb) { showToast('Supabase not configured', 'error'); return; }
  var email = document.getElementById('authEmail').value.trim();
  var password = document.getElementById('authPassword').value;
  if (!email || !password) { showToast('Enter email and password', 'error'); return; }
  var res = await sb.auth.signInWithPassword({ email: email, password: password });
  if (res.error) { showToast(res.error.message, 'error'); return; }
  closeModal();
  showToast('Signed in', 'success');
}

async function signUp() {
  if (!sb) { showToast('Supabase not configured', 'error'); return; }
  var email = document.getElementById('authEmail').value.trim();
  var password = document.getElementById('authPassword').value;
  if (!email || !password) { showToast('Enter email and password', 'error'); return; }
  if (password.length < 6) { showToast('Password must be at least 6 characters', 'error'); return; }
  var res = await sb.auth.signUp({ email: email, password: password });
  if (res.error) { showToast(res.error.message, 'error'); return; }
  if (res.data.session) {
    closeModal();
    showToast('Account created', 'success');
  } else {
    showToast('Check your email to confirm, then sign in', 'success');
  }
}

async function signOut() {
  if (!sb) return;
  await sb.auth.signOut();
  sbUser = null;
  syncStatus = 'signed';
  updateSyncUI();
  closeModal();
  showToast('Signed out — local data kept on this device', 'success');
}

function showToast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.className = 'toast'; }, 3000);
}

function getSection(id) {
  for (var i = 0; i < state.sections.length; i++) {
    if (state.sections[i].id === id) return state.sections[i];
  }
  return null;
}

function getSectionTitle(id) {
  var s = getSection(id);
  return s ? s.title : 'Unknown';
}

function getTopSections() {
  return state.sections.filter(function(s) { return !s.parentId; }).sort(function(a,b) { return a.order - b.order; });
}

function getChildSections(parentId) {
  return state.sections.filter(function(s) { return s.parentId === parentId; }).sort(function(a,b) { return a.order - b.order; });
}

function getTopicsInSection(sectionId) {
  return state.topics.filter(function(t) { return t.sectionId === sectionId; }).sort(function(a,b) { return a.order - b.order; });
}

function getAllDescendantSectionIds(sectionId) {
  var ids = [sectionId];
  getChildSections(sectionId).forEach(function(child) {
    ids = ids.concat(getAllDescendantSectionIds(child.id));
  });
  return ids;
}

function getFilteredTopics() {
  var t = state.topics.slice();
  if (activeTab !== 'All') {
    var secIds = getAllDescendantSectionIds(activeTab);
    t = t.filter(function(x) { return secIds.indexOf(x.sectionId) >= 0; });
  }
  if (statusFilter !== 'all') t = t.filter(function(x) { return x.status === statusFilter; });
  if (searchQ) {
    var q = searchQ.toLowerCase();
    t = t.filter(function(x) {
      return x.name.toLowerCase().indexOf(q) > -1 ||
        (x.notes && x.notes.toLowerCase().indexOf(q) > -1) ||
        getSectionTitle(x.sectionId).toLowerCase().indexOf(q) > -1;
    });
  }
  return t;
}

function countProgress(topicList) {
  var done = topicList.filter(function(x) { return x.status === 'done'; }).length;
  return { done: done, total: topicList.length };
}

function updateProgress() {
  var p = countProgress(state.topics);
  var pct = p.total ? Math.round(p.done / p.total * 100) : 0;
  document.getElementById('pct').textContent = pct + '%';
  document.getElementById('progressBar').style.width = pct + '%';
  var wrap = document.getElementById('progressWrap');
  wrap.setAttribute('aria-valuenow', pct);
  wrap.setAttribute('aria-label', pct + '% complete');
}

function renderTabs() {
  var html = '';
  var allP = countProgress(state.topics);
  html += '<button class="tab tab-all' + (activeTab === 'All' ? ' active' : '') + '" onclick="switchTab(\'All\')" aria-pressed="' + (activeTab === 'All') + '">' +
    '<span class="tab-ico">' + ico('grid', 13) + '</span> All ' + allP.done + '/' + allP.total + '</button>';

  getTopSections().forEach(function(sec) {
    var secIds = getAllDescendantSectionIds(sec.id);
    var secTopics = state.topics.filter(function(t) { return secIds.indexOf(t.sectionId) >= 0; });
    var p = countProgress(secTopics);
    var label = SHORT[sec.id] || sec.title.substring(0, 4).toUpperCase();
    var th = secTheme(sec.id);
    html += '<button class="tab ' + tabClass(sec.id) + (activeTab === sec.id ? ' active' : '') + '" onclick="switchTab(\'' + esc(sec.id) + '\')" aria-pressed="' + (activeTab === sec.id) + '" title="' + esc(sec.title) + '">' +
      '<span class="tab-ico">' + ico(th.icon, 13) + '</span> ' + esc(label) + ' ' + p.done + '/' + p.total + '</button>';
  });

  document.getElementById('tabBar').innerHTML = html;
}

function formatDate(iso) {
  if (!iso) return '';
  try {
    var d = new Date(iso);
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  } catch(e) { return ''; }
}

function metaHTML(t) {
  var html = '';
  var th = secTheme(t.sectionId);
  html += '<span class="meta-chip" style="color:' + th.color + ';background:' + th.bg + ';border-color:' + th.color + '33">' + ico(th.icon, 11) + ' ' + esc(getSectionTitle(t.sectionId)) + '</span>';
  if (t.priority === 'high') html += '<span class="meta-chip priority-high">' + ico('flag', 11) + ' High</span>';
  if (t.notes) html += '<span class="meta-chip notes">' + ico('note', 11) + ' Notes</span>';
  if (t.resources && t.resources.length) html += '<span class="meta-chip links">' + ico('link', 11) + ' ' + t.resources.length + '</span>';
  if (t.lastReviewed) html += '<span class="meta-chip reviewed">' + ico('calendar', 11) + ' ' + formatDate(t.lastReviewed) + '</span>';
  return html;
}

function cardHTML(t) {
  var sc = t.status === 'in-progress' ? 'progress' : t.status;
  var cssStatus = sc === 'progress' ? 'progress' : sc;
  var isOpen = openCards[t.id] ? 'open' : '';
  var pClass = t.priority === 'high' ? ' p-high' : '';

    t.resources.forEach(function(r, idx) {

      var title = esc(r.title || r.url || 'Link');
      resourcesHTML += '<div class="resource-item">' + ico('link', 14) + '<a href="' + url + '" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">' + title + '</a><button type="button" aria-label="Remove link" onclick="event.stopPropagation();removeResource(\'' + esc(t.id) + '\',' + idx + ')">' + ico('x', 14) + '</button></div>';
    });
    resourcesHTML += '</div>';
  }

  return '<div class="topic-card s-' + cssStatus + pClass + '" id="card-' + esc(t.id) + '">' +
    '<div class="topic-row" onclick="toggleCard(\'' + esc(t.id) + '\')" role="button" tabindex="0" aria-expanded="' + !!openCards[t.id] + '" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();toggleCard(\'' + esc(t.id) + '\')}">' +
      '<div class="status-dot" aria-hidden="true">' + statusIcon(t.status) + '</div>' +
      '<div class="topic-info">' +
        '<div class="topic-name">' + esc(t.name) + '</div>' +
        '<div class="topic-meta">' + metaHTML(t) + '</div>' +
      '</div>' +
      '<span class="status-badge badge-' + cssStatus + '">' + statusIcon(t.status) + ' ' + (LABEL[t.status] || 'Pending') + '</span>' +
    '</div>' +
    '<div class="topic-notes ' + isOpen + '" id="notes-' + esc(t.id) + '">' +
      '<label class="field-label" for="ta-' + esc(t.id) + '">' + ico('note', 13) + ' Notes</label>' +
      '<textarea class="notes-input" id="ta-' + esc(t.id) + '" placeholder="Key points, approach, things to remember…" rows="3">' + esc(t.notes || '') + '</textarea>' +
      '<span class="field-label">' + ico('link', 13) + ' Resources</span>' +
      resourcesHTML +
      '<div class="resource-add">' +
        '<input type="text" id="res-title-' + esc(t.id) + '" placeholder="Title" aria-label="Resource title">' +
        '<input type="url" id="res-url-' + esc(t.id) + '" placeholder="https://…" aria-label="Resource URL">' +
        '<button class="btn btn-ghost" type="button" onclick="addResource(\'' + esc(t.id) + '\')">' + ico('plus', 12) + ' Add</button>' +
      '</div>' +
      '<div class="notes-actions">' +
        '<select class="priority-select" id="pri-' + esc(t.id) + '" aria-label="Priority" onchange="setPriority(\'' + esc(t.id) + '\',this.value)">' +
          '<option value="low"' + (t.priority==='low'?' selected':'') + '>Low priority</option>' +
          '<option value="medium"' + (t.priority==='medium'?' selected':'') + '>Medium priority</option>' +
          '<option value="high"' + (t.priority==='high'?' selected':'') + '>High priority</option>' +
        '</select>' +
        '<button class="btn btn-pending" type="button" onclick="setStatus(\'' + esc(t.id) + '\',\'pending\')">' + ico('circle', 12) + ' Pending</button>' +
        '<button class="btn btn-progress" type="button" onclick="setStatus(\'' + esc(t.id) + '\',\'in-progress\')">' + ico('play', 12) + ' In Progress</button>' +
        '<button class="btn btn-done" type="button" onclick="setStatus(\'' + esc(t.id) + '\',\'done\')">' + ico('check', 12) + ' Done</button>' +
        '<button class="btn btn-ghost" type="button" onclick="openEditTopic(\'' + esc(t.id) + '\')">' + ico('edit', 12) + ' Edit</button>' +
        '<button class="btn btn-save" type="button" onclick="saveNotes(\'' + esc(t.id) + '\')">' + ico('save', 12) + ' Save</button>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function renderSectionTree(sectionId, filteredIds, depth) {
  var sec = getSection(sectionId);
  if (!sec) return '';
  depth = depth || 0;
  var childSecs = getChildSections(sectionId);
  var topics = getTopicsInSection(sectionId).filter(function(t) { return filteredIds.indexOf(t.id) >= 0; });
  var childTopics = [];
  childSecs.forEach(function(cs) {
    getTopicsInSection(cs.id).forEach(function(t) {
      if (filteredIds.indexOf(t.id) >= 0) childTopics.push(t.id);
    });
  });

  var hasContent = topics.length || childSecs.some(function(cs) {
    return getFilteredTopicsInSection(cs.id, filteredIds).length > 0;
  });
  if (!hasContent && activeTab !== 'All' && activeTab !== sectionId) return '';

  var allInSec = getTopicsInSection(sectionId);
  childSecs.forEach(function(cs) {
    getAllDescendantSectionIds(cs.id).forEach(function(id) {
      if (id !== cs.id) getTopicsInSection(id).forEach(function(t) { allInSec.push(t); });
    });
  });
  var visibleInSec = allInSec.filter(function(t) { return filteredIds.indexOf(t.id) >= 0; });
  if (!visibleInSec.length && !childSecs.length) return '';

  var p = countProgress(visibleInSec.length ? visibleInSec : allInSec);
  var collapsed = sec.collapsed ? ' collapsed' : '';
  var nested = depth > 0 ? ' nested' : '';
  var bodyHidden = sec.collapsed ? ' hidden' : '';
  var th = secTheme(sec.id);

  var html = '<div class="section-block">';
  html += '<div class="section-header' + collapsed + nested + '" data-section-id="' + esc(sec.id) + '" onclick="toggleSection(\'' + esc(sec.id) + '\')" role="button" tabindex="0" aria-expanded="' + !sec.collapsed + '" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();toggleSection(\'' + esc(sec.id) + '\')}">' +
    '<span class="section-icon" style="background:' + th.bg + ';color:' + th.color + '">' + ico(th.icon, 14) + '</span>' +
    '<span class="section-chevron" aria-hidden="true">' + ico('chevron', 12) + '</span>' +
    '<span class="section-title">' + esc(sec.title) + '</span>' +
    '<span class="section-count">' + p.done + '/' + (visibleInSec.length || allInSec.length) + '</span>' +
    '<span class="section-actions" onclick="event.stopPropagation()">' +
      '<button type="button" aria-label="Edit section" onclick="openEditSection(\'' + esc(sec.id) + '\')">' + ico('edit', 14) + '</button>' +
      '<button type="button" aria-label="Add sub-section" onclick="openSectionModal(\'' + esc(sec.id) + '\')">' + ico('plus', 14) + '</button>' +
    '</span>' +
  '</div>';
  html += '<div class="section-body' + bodyHidden + '" id="secbody-' + esc(sec.id) + '">';
  topics.forEach(function(t) { html += cardHTML(t); });
  childSecs.forEach(function(cs) {
    html += renderSectionTree(cs.id, filteredIds, depth + 1);
  });
  html += '</div></div>';
  return html;
}

function getFilteredTopicsInSection(sectionId, filteredIds) {
  var ids = getAllDescendantSectionIds(sectionId);
  return state.topics.filter(function(t) { return ids.indexOf(t.sectionId) >= 0 && filteredIds.indexOf(t.id) >= 0; });
}

function renderMain() {
  var filtered = getFilteredTopics();
  var filteredIds = filtered.map(function(t) { return t.id; });
  var html = '';

  if (activeTab === 'All' && !searchQ && statusFilter === 'all') {
    var done = state.topics.filter(function(x) { return x.status === 'done'; }).length;
    var prog = state.topics.filter(function(x) { return x.status === 'in-progress'; }).length;
    var pend = state.topics.filter(function(x) { return x.status === 'pending'; }).length;
    html += '<div class="stats-grid" role="group" aria-label="Progress summary">' +
      '<div class="stat-card"><span class="stat-icon done">' + ico('check', 17) + '</span><span class="stat-num" style="color:var(--green)">' + done + '</span><span class="stat-label">Done</span></div>' +
      '<div class="stat-card"><span class="stat-icon progress">' + ico('play', 17) + '</span><span class="stat-num" style="color:var(--yellow)">' + prog + '</span><span class="stat-label">In Progress</span></div>' +
      '<div class="stat-card"><span class="stat-icon pending">' + ico('circle', 17) + '</span><span class="stat-num" style="color:var(--muted)">' + pend + '</span><span class="stat-label">Pending</span></div>' +
    '</div>';
  }

  html += '<div class="toolbar">' +
    '<div class="search-wrap">' +
      '<span class="search-icon" aria-hidden="true">' + ico('search', 16) + '</span>' +
      '<input class="search-input" placeholder="Search topics, notes, sections…" value="' + esc(searchQ) + '" oninput="onSearch(this.value)" aria-label="Search">' +
    '</div>' +
    '<div class="filter-wrap">' +
      '<span class="filter-ico" aria-hidden="true">' + ico('filter', 14) + '</span>' +
      '<select class="filter-select" onchange="setStatusFilter(this.value)" aria-label="Filter by status">' +
        '<option value="all"' + (statusFilter==='all'?' selected':'') + '>All status</option>' +
        '<option value="pending"' + (statusFilter==='pending'?' selected':'') + '>Pending</option>' +
        '<option value="in-progress"' + (statusFilter==='in-progress'?' selected':'') + '>In progress</option>' +
        '<option value="done"' + (statusFilter==='done'?' selected':'') + '>Done</option>' +
      '</select>' +
    '</div>' +
  '</div>';

  if (!filtered.length) {
    html += '<div class="empty"><div class="empty-icon" aria-hidden="true">' + ico('search', 26) + '</div><p>No topics found</p>' +
      '<button class="btn btn-save" type="button" onclick="openTopicModal()">' + ico('plus', 12) + ' Add a topic</button></div>';
  } else if (activeTab === 'All' && !searchQ) {
    var roots = getTopSections();
    roots.forEach(function(sec) {
      html += renderSectionTree(sec.id, filteredIds, 0);
    });
    var orphanTopics = filtered.filter(function(t) {
      var sec = getSection(t.sectionId);
      return !sec || !state.sections.some(function(s) { return s.id === t.sectionId; });
    });
    if (orphanTopics.length) {
      html += '<div class="section-header" style="cursor:default"><span class="section-icon" style="background:#f8fafc;color:#64748b">' + ico('folder', 14) + '</span><span class="section-title">Uncategorized</span><span class="section-count">' + orphanTopics.length + '</span></div>';
      orphanTopics.forEach(function(t) { html += cardHTML(t); });
    }
  } else {
    var secIds = activeTab === 'All' ? null : getAllDescendantSectionIds(activeTab);
    var list = filtered.slice();
    if (secIds) list = list.filter(function(t) { return secIds.indexOf(t.sectionId) >= 0; });
    var p = countProgress(list);
    var headerTitle = activeTab === 'All' ? 'Results' : getSectionTitle(activeTab);
    var hTh = activeTab === 'All' ? DEFAULT_SEC_THEME : secTheme(activeTab);
    var hIcon = activeTab === 'All' ? 'search' : hTh.icon;
    html += '<div class="section-header" style="cursor:default"><span class="section-icon" style="background:' + hTh.bg + ';color:' + hTh.color + '">' + ico(hIcon, 14) + '</span><span class="section-title">' + esc(headerTitle) + '</span><span class="section-count">' + p.done + '/' + p.total + '</span></div>';
    list.forEach(function(t) { html += cardHTML(t); });
  }

  document.getElementById('mainContent').innerHTML = html;
}

function toggleSection(id) {
  var sec = getSection(id);
  if (!sec) return;
  sec.collapsed = !sec.collapsed;
  saveData();
  var header = document.querySelector('.section-header[data-section-id="' + id + '"]');
  var body = document.getElementById('secbody-' + id);
  if (header) {
    header.classList.toggle('collapsed', sec.collapsed);
    header.setAttribute('aria-expanded', !sec.collapsed);
  }
  if (body) body.classList.toggle('hidden', sec.collapsed);
}

function toggleCard(id) {
  openCards[id] = !openCards[id];
  var el = document.getElementById('notes-' + id);
  var row = document.querySelector('#card-' + id + ' .topic-row');
  if (el) { if (openCards[id]) el.classList.add('open'); else el.classList.remove('open'); }
  if (row) row.setAttribute('aria-expanded', !!openCards[id]);
}

function findTopic(id) {
  for (var i = 0; i < state.topics.length; i++) {
    if (state.topics[i].id === id) return state.topics[i];
  }
  return null;
}

function setStatus(id, status) {
  var t = findTopic(id);
  if (!t) return;
  t.status = status;
  if (status === 'done') t.lastReviewed = new Date().toISOString();
  saveData();
  render();
}

function setPriority(id, priority) {
  var t = findTopic(id);
  if (!t) return;
  t.priority = priority;
  saveData();
}

function addResource(id) {
  var t = findTopic(id);
  if (!t) return;
  var titleEl = document.getElementById('res-title-' + id);
  var urlEl = document.getElementById('res-url-' + id);
  var url = urlEl ? urlEl.value.trim() : '';
  if (!url) { if (urlEl) urlEl.focus(); return; }
  var title = titleEl ? titleEl.value.trim() : '';
  if (!title) title = url;
  if (!t.resources) t.resources = [];
  t.resources.push({ title: title, url: url });
  if (titleEl) titleEl.value = '';
  if (urlEl) urlEl.value = '';
  saveData();
  openCards[id] = true;
  render();
}

function removeResource(id, idx) {
  var t = findTopic(id);
  if (!t || !t.resources) return;
  t.resources.splice(idx, 1);
  saveData();
  openCards[id] = true;
  render();
}

function saveNotes(id) {
  var ta = document.getElementById('ta-' + id);
  var t = findTopic(id);
  if (!t) return;
  if (ta) t.notes = ta.value;
  var pri = document.getElementById('pri-' + id);
  if (pri) t.priority = pri.value;
  openCards[id] = false;
  saveData();
  render();
  showToast('Saved', 'success');
}

function switchTab(id) { activeTab = id; render(); }
function onSearch(v) { searchQ = v; renderMain(); }
function setStatusFilter(v) { statusFilter = v; renderMain(); }

function toggleFab() {
  var menu = document.getElementById('fabMenu');
  var btn = document.getElementById('fabMain');
  var open = menu.classList.toggle('open');
  btn.classList.toggle('open', open);
  btn.setAttribute('aria-expanded', open);
}

function closeFab() {
  document.getElementById('fabMenu').classList.remove('open');
  var btn = document.getElementById('fabMain');
  btn.classList.remove('open');
  btn.setAttribute('aria-expanded', 'false');
}

function sectionOptions(selectedId, parentId) {
  var html = '<option value="">— Top level —</option>';
  getTopSections().forEach(function(s) {
    if (s.id === selectedId) return;
    html += '<option value="' + esc(s.id) + '"' + (parentId === s.id ? ' selected' : '') + '>' + esc(s.title) + '</option>';
    getChildSections(s.id).forEach(function(c) {
      if (c.id === selectedId) return;
      html += '<option value="' + esc(c.id) + '"' + (parentId === c.id ? ' selected' : '') + '>  ↳ ' + esc(c.title) + '</option>';
    });
  });
  return html;
}

function topicSectionOptions(selectedId) {
  var html = '';
  getTopSections().forEach(function(s) {
    html += '<option value="' + esc(s.id) + '"' + (selectedId === s.id ? ' selected' : '') + '>' + esc(s.title) + '</option>';
    getChildSections(s.id).forEach(function(c) {
      html += '<option value="' + esc(c.id) + '"' + (selectedId === c.id ? ' selected' : '') + '>  ↳ ' + esc(c.title) + '</option>';
    });
  });
  return html;
}

function openModal(html, mode) {
  modalMode = mode;
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.remove('hidden');
  closeFab();
  var first = document.querySelector('#modalContent input, #modalContent select, #modalContent button');
  if (first) setTimeout(function() { first.focus(); }, 50);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.add('hidden');
  modalMode = null;
  editingId = null;
}

function openTopicModal() {
  var defaultSec = activeTab !== 'All' ? activeTab : (getTopSections()[0] ? getTopSections()[0].id : 'sec-sd');
  openModal(
    '<h3 id="modalTitle">Add Topic</h3>' +
    '<p class="modal-sub">Add a topic under any section</p>' +
    '<label class="field-label" for="newName">Name</label>' +
    '<input class="modal-input" id="newName" placeholder="e.g. Design Twitter" />' +
    '<label class="field-label" for="newSection">Section</label>' +
    '<select class="modal-select" id="newSection">' + topicSectionOptions(defaultSec) + '</select>' +
    '<label class="field-label" for="newPriority">Priority</label>' +
    '<select class="modal-select" id="newPriority"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option></select>' +
    '<div class="modal-btns"><button class="modal-cancel" type="button" onclick="closeModal()">Cancel</button><button class="modal-add" type="button" onclick="addTopic()">Add</button></div>',
    'addTopic'
  );
}

function openSectionModal(parentId) {
  openModal(
    '<h3 id="modalTitle">Add Section</h3>' +
    '<p class="modal-sub">Group related topics together</p>' +
    '<label class="field-label" for="newSecTitle">Title</label>' +
    '<input class="modal-input" id="newSecTitle" placeholder="e.g. Mock Interviews" />' +
    '<label class="field-label" for="newSecParent">Parent section (optional)</label>' +
    '<select class="modal-select" id="newSecParent">' + sectionOptions(null, parentId || null) + '</select>' +
    '<div class="modal-btns"><button class="modal-cancel" type="button" onclick="closeModal()">Cancel</button><button class="modal-add" type="button" onclick="addSection()">Add</button></div>',
    'addSection'
  );
}

function openEditTopic(id) {
  var t = findTopic(id);
  if (!t) return;
  editingId = id;
  openModal(
    '<h3 id="modalTitle">Edit Topic</h3>' +
    '<label class="field-label" for="editName">Name</label>' +
    '<input class="modal-input" id="editName" value="' + esc(t.name) + '" />' +
    '<label class="field-label" for="editSection">Section</label>' +
    '<select class="modal-select" id="editSection">' + topicSectionOptions(t.sectionId) + '</select>' +
    '<div class="modal-btns">' +
      '<button class="modal-cancel" type="button" onclick="closeModal()">Cancel</button>' +
      '<button class="modal-cancel modal-danger" type="button" onclick="confirmDeleteTopic()">Delete</button>' +
      '<button class="modal-add" type="button" onclick="saveEditTopic()">Save</button>' +
    '</div>',
    'editTopic'
  );
}

function openEditSection(id) {
  var sec = getSection(id);
  if (!sec) return;
  editingId = id;
  var topicCount = getTopicsInSection(id).length;
  openModal(
    '<h3 id="modalTitle">Edit Section</h3>' +
    '<label class="field-label" for="editSecTitle">Title</label>' +
    '<input class="modal-input" id="editSecTitle" value="' + esc(sec.title) + '" />' +
    '<label class="field-label" for="editSecParent">Parent section</label>' +
    '<select class="modal-select" id="editSecParent">' + sectionOptions(id, sec.parentId) + '</select>' +
    (topicCount ? '<p class="modal-sub">' + topicCount + ' topic(s) in this section</p>' : '') +
    '<div class="modal-btns">' +
      '<button class="modal-cancel" type="button" onclick="closeModal()">Cancel</button>' +
      '<button class="modal-cancel modal-danger" type="button" onclick="confirmDeleteSection()">Delete</button>' +
      '<button class="modal-add" type="button" onclick="saveEditSection()">Save</button>' +
    '</div>',
    'editSection'
  );
}

function openSettings() {
  var cloudLine = SUPABASE_ENABLED
    ? (sbUser ? 'Signed in as ' + esc(sbUser.email) : 'Not signed in — <a href="#" onclick="event.preventDefault();openAccount()">sign in to sync</a>')
    : 'Cloud sync: add supabase-config.js to enable';
  openModal(
    '<h3 id="modalTitle">' + ico('settings', 18) + ' Settings & Backup</h3>' +
    '<p class="modal-sub">' + cloudLine + '</p>' +
    '<ul class="settings-list">' +
      (SUPABASE_ENABLED ? '<li><button class="settings-btn" type="button" onclick="openAccount()"><span class="settings-ico auth">' + ico('user', 17) + '</span><span class="desc">Account & sync<small>Sign in across devices</small></span></button></li>' : '') +
      (SUPABASE_ENABLED && sbUser ? '<li><button class="settings-btn" type="button" onclick="manualCloudSync()"><span class="settings-ico sync">' + ico('cloud', 17) + '</span><span class="desc">Sync now<small>Merge cloud and this device</small></span></button></li>' : '') +
      '<li><button class="settings-btn" type="button" onclick="exportData()"><span class="settings-ico export">' + ico('download', 17) + '</span><span class="desc">Export backup<small>Download JSON file</small></span></button></li>' +
      '<li><button class="settings-btn" type="button" onclick="triggerImport()"><span class="settings-ico import">' + ico('upload', 17) + '</span><span class="desc">Import backup<small>Restore from JSON file</small></span></button></li>' +
      '<li><button class="settings-btn" type="button" onclick="restoreFromBackup()"><span class="settings-ico restore">' + ico('restore', 17) + '</span><span class="desc">Restore auto-backup<small>Last save before current</small></span></button></li>' +
    '</ul>' +
    '<p class="modal-sub" style="margin-top:12px">' + state.sections.length + ' sections · ' + state.topics.length + ' topics · v' + DATA_VERSION + '</p>' +
    '<div class="modal-btns"><button class="modal-cancel" type="button" onclick="closeModal()" style="flex:1">Close</button></div>',
    'settings'
  );
}

function addTopic() {
  var name = document.getElementById('newName').value.trim();
  if (!name) { document.getElementById('newName').focus(); return; }
  var sectionId = document.getElementById('newSection').value;
  var priority = document.getElementById('newPriority').value;
  var order = getTopicsInSection(sectionId).length;
  state.topics.push(normalizeTopic({
    id: 'c' + Date.now(),
    sectionId: sectionId,
    name: name,
    status: 'pending',
    notes: '',
    order: order,
    priority: priority,
    resources: [],
    lastReviewed: null
  }));
  saveData();
  closeModal();
  render();
  showToast('Topic added', 'success');
}

function addSection() {
  var title = document.getElementById('newSecTitle').value.trim();
  if (!title) { document.getElementById('newSecTitle').focus(); return; }
  var parentVal = document.getElementById('newSecParent').value;
  var parentId = parentVal || null;
  var maxOrder = state.sections.reduce(function(m, s) { return Math.max(m, s.order); }, -1);
  var sec = normalizeSection({
    id: 'sec' + Date.now(),
    title: title,
    order: maxOrder + 1,
    parentId: parentId,
    collapsed: false
  });
  state.sections.push(sec);
  saveData();
  closeModal();
  render();
  showToast('Section added', 'success');
}

function saveEditTopic() {
  var t = findTopic(editingId);
  if (!t) return;
  var name = document.getElementById('editName').value.trim();
  if (!name) { document.getElementById('editName').focus(); return; }
  t.name = name;
  t.sectionId = document.getElementById('editSection').value;
  saveData();
  closeModal();
  render();
  showToast('Topic updated', 'success');
}

function saveEditSection() {
  var sec = getSection(editingId);
  if (!sec) return;
  var title = document.getElementById('editSecTitle').value.trim();
  if (!title) { document.getElementById('editSecTitle').focus(); return; }
  var newParent = document.getElementById('editSecParent').value || null;
  if (newParent === sec.id) { showToast('Section cannot be its own parent', 'error'); return; }
  sec.title = title;
  sec.parentId = newParent;
  saveData();
  closeModal();
  render();
  showToast('Section updated', 'success');
}

function confirmDeleteTopic() {
  if (!confirm('Delete this topic? This cannot be undone.')) return;
  state.topics = state.topics.filter(function(t) { return t.id !== editingId; });
  delete openCards[editingId];
  saveData();
  closeModal();
  render();
  showToast('Topic deleted', 'success');
}

function confirmDeleteSection() {
  var sec = getSection(editingId);
  if (!sec) return;
  var topicsInSec = state.topics.filter(function(t) { return t.sectionId === editingId; });
  var msg = topicsInSec.length
    ? 'Delete "' + sec.title + '" and its ' + topicsInSec.length + ' topic(s)? This cannot be undone.'
    : 'Delete section "' + sec.title + '"?';
  if (!confirm(msg)) return;
  var childIds = getChildSections(editingId).map(function(c) { return c.id; });
  state.sections = state.sections.filter(function(s) {
    return s.id !== editingId && childIds.indexOf(s.id) < 0;
  });
  var removeIds = [editingId].concat(childIds);
  state.topics = state.topics.filter(function(t) { return removeIds.indexOf(t.sectionId) < 0; });
  if (activeTab === editingId) activeTab = 'All';
  saveData();
  closeModal();
  render();
  showToast('Section deleted', 'success');
}

function exportData() {
  var blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'swe-prep-backup-' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('Backup downloaded', 'success');
}

function triggerImport() {
  document.getElementById('importFile').click();
}

function handleImport(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var parsed = JSON.parse(e.target.result);
      var imported;
      if (Array.isArray(parsed)) {
        imported = mergeWithDefaults(migrateV2(parsed));
      } else if (parsed.topics || parsed.sections) {
        imported = mergeWithDefaults(validateState(parsed));
      } else {
        throw new Error('Unrecognized format');
      }
      if (!confirm('Import will merge with your current data. Topics with same IDs keep your progress. Continue?')) {
        event.target.value = '';
        return;
      }
      mergeImport(imported);
      saveData();
      closeModal();
      render();
      showToast('Import successful', 'success');
    } catch(err) {
      showToast('Import failed: invalid file', 'error');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

function mergeTopic(a, b) {
  var statusRank = { pending: 0, 'in-progress': 1, done: 2 };
  var priRank = { low: 0, medium: 1, high: 2 };
  var merged = clone(a);
  if ((statusRank[b.status] || 0) > (statusRank[a.status] || 0)) merged.status = b.status;
  if ((b.notes || '').length > (a.notes || '').length) merged.notes = b.notes;
  var urls = {};
  (a.resources || []).forEach(function(r) { if (r && r.url) urls[r.url] = r; });
  (b.resources || []).forEach(function(r) { if (r && r.url) urls[r.url] = r; });
  merged.resources = Object.keys(urls).map(function(k) { return urls[k]; });
  if ((priRank[b.priority] || 0) > (priRank[a.priority] || 0)) merged.priority = b.priority;
  if (b.lastReviewed && (!a.lastReviewed || b.lastReviewed > a.lastReviewed)) merged.lastReviewed = b.lastReviewed;
  if (b.name && b.name !== 'Untitled' && (!a.name || a.name === 'Untitled')) merged.name = b.name;
  return merged;
}

function mergeStates(local, remote) {
  var result = validateState(clone(local));
  var secMap = {};
  result.sections.forEach(function(s) { secMap[s.id] = s; });
  remote.sections.forEach(function(rs) {
    if (!secMap[rs.id]) {
      result.sections.push(clone(rs));
      secMap[rs.id] = rs;
    } else if (secMap[rs.id].title === 'Untitled Section' && rs.title) {
      secMap[rs.id].title = rs.title;
    }
  });

  var topicMap = {};
  result.topics.forEach(function(t) { topicMap[t.id] = t; });
  remote.topics.forEach(function(rt) {
    if (!topicMap[rt.id]) result.topics.push(clone(rt));
    else topicMap[rt.id] = mergeTopic(topicMap[rt.id], rt);
  });

  return mergeWithDefaults(result);
}

function mergeImport(imported) {
  var secIds = {};
  state.sections.forEach(function(s) { secIds[s.id] = s; });
  imported.sections.forEach(function(s) {
    if (secIds[s.id]) {
      if (!secIds[s.id].title || secIds[s.id].title === 'Untitled Section') secIds[s.id].title = s.title;
    } else {
      state.sections.push(s);
      secIds[s.id] = s;
    }
  });

  var topicIds = {};
  state.topics.forEach(function(t) { topicIds[t.id] = t; });
  imported.topics.forEach(function(t) {
    if (topicIds[t.id]) {
      var existing = topicIds[t.id];
      if (t.status && existing.status === 'pending') existing.status = t.status;
    } else {
      state.topics.push(t);
    }
  });
}

function restoreFromBackup() {
  try {
    var backup = localStorage.getItem(BACKUP_KEY);
    if (!backup) { showToast('No auto-backup found', 'error'); return; }
    if (!confirm('Restore from the last auto-backup? Current data will be backed up first.')) return;
    state = mergeWithDefaults(validateState(JSON.parse(backup)));
    saveData();
    closeModal();
    render();
    showToast('Restored from backup', 'success');
  } catch(e) {
    showToast('Backup restore failed', 'error');
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (!document.getElementById('modalOverlay').classList.contains('hidden')) closeModal();
    else closeFab();
  }
});

document.addEventListener('click', function(e) {
  var fab = document.querySelector('.fab-wrap');
  if (fab && !fab.contains(e.target)) closeFab();
});

function render() { updateProgress(); renderTabs(); renderMain(); }

function initStaticIcons() {
  var logo = document.getElementById('logoIcon');
  if (logo) logo.innerHTML = ico('target', 15);
  var prog = document.getElementById('progIcon');
  if (prog) prog.innerHTML = ico('check', 16);
  var account = document.getElementById('accountBtn');
  if (account) account.innerHTML = ico('user', 17);
  var settings = document.getElementById('settingsBtn');
  if (settings) settings.innerHTML = ico('settings', 17);
  var fab = document.getElementById('fabMain');
  if (fab) fab.innerHTML = ico('plus', 24);
  var fabT = document.getElementById('fabTopicIco');
  if (fabT) fabT.innerHTML = ico('file', 15);
  var fabS = document.getElementById('fabSecIco');
  if (fabS) fabS.innerHTML = ico('folder', 15);
}

async function boot() {
  loadData();
  initStaticIcons();
  if (initSupabase()) {
    syncStatus = 'signed';
    updateSyncUI();
    try {
      var sessionRes = await sb.auth.getSession();
      if (sessionRes.data && sessionRes.data.session) {
        await handleAuthChange(sessionRes.data.session);
      }
    } catch(e) {}
  } else {
    updateSyncUI();
  }
  render();
}

boot();
</script>
